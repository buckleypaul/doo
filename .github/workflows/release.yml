name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: swift build -c release

      - name: Assemble Doo.app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p Doo.app/Contents/MacOS
          cp .build/release/Doo    Doo.app/Contents/MacOS/Doo
          cp .build/release/DooCLI Doo.app/Contents/MacOS/DooCLI
          sed "s/BUNDLE_VERSION_PLACEHOLDER/${VERSION}/g" \
            Support/Info.plist > Doo.app/Contents/Info.plist

      - name: Zip the app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Doo.app Doo.zip

      - name: Print SHA256 (for cask update)
        run: shasum -a 256 Doo.zip

      - name: Create GitHub Release and upload zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GH_REPO}" \
            --title "v${VERSION}" \
            --generate-notes \
            Doo.zip
