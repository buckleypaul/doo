name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version constant
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: sed -i '' "s/let dooVersion = \".*\"/let dooVersion = \"${VERSION}\"/" Sources/DooCore/Version.swift

      - name: Build release binaries
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
        run: swift build -c release

      - name: Assemble Doo.app bundle
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p Doo.app/Contents/MacOS
          cp .build/release/Doo    Doo.app/Contents/MacOS/Doo
          cp .build/release/DooCLI Doo.app/Contents/MacOS/DooCLI
          sed "s/BUNDLE_VERSION_PLACEHOLDER/${VERSION}/g" \
            Support/Info.plist > Doo.app/Contents/Info.plist

      - name: Zip the app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Doo.app Doo.zip

      - name: Create GitHub Release and upload zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GH_REPO}" \
            --title "v${VERSION}" \
            --generate-notes \
            Doo.zip

      - name: Update homebrew-tap cask
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SHA=$(shasum -a 256 Doo.zip | awk '{print $1}')
          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/buckleypaul/homebrew-tap.git" tap
          cd tap
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/doo.rb
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/doo.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/doo.rb
          git commit -m "chore: update doo cask to v${VERSION}"
          git push
